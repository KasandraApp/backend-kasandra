# Kasandra Backend - Render Blueprint
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: kasandra-backend
    runtime: node
    repo: https://github.com/your-username/kasandra
    branch: main
    rootDir: backend-kasandra
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: kasandra-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://kasandra-frontend.vercel.app
      - key: REDIS_URL
        value: redis://red-c771a7a2d3e5cgb2k6d0:6379
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://kasandra-backend.onrender.com/api/v1/auth/google/callback

databases:
  - name: kasandra-db
    databaseName: kasandra
    user: kasandra
    region: singapore
    plan: free
