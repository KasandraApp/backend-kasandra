version: '3.9'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
    - .env
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/kasandra
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kasandra
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_epic1_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./db/seeds/001_epic1_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  postgres_data:
